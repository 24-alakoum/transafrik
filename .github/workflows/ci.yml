name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Check typing
        run: npx tsc --noEmit
        
      - name: Lint
        run: npm run lint
        
      # On commente les tests pour le moment car ils ne sont pas encore créés
      # - name: Run Unit Tests
      #   run: npm run test:unit
      
      # - name: Run E2E Tests
      #   run: npx playwright test
        
      - name: Security Audit
        run: npm audit --audit-level=high || true # Ne pas bloquer la CI pour l'instant
